# /etc/prometheus/prometheus.yml
#
# Prometheus configuration for SSL offloading proxy monitoring
#

global:
  scrape_interval: 15s        # Scrape targets every 15 seconds
  evaluation_interval: 15s    # Evaluate alert rules every 15 seconds
  scrape_timeout: 10s

# Alert rules
rule_files:
  - "alert_rules.yml"

# Scrape targets
scrape_configs:

  # ---- Prometheus itself ----
  - job_name: "prometheus"
    static_configs:
      - targets: ["localhost:9090"]
        labels:
          instance: "prometheus"

  # ---- Node Exporter (system metrics) ----
  # CPU, memory, disk, network, file descriptors, entropy, etc.
  - job_name: "node_exporter"
    static_configs:
      - targets: ["localhost:9100"]
        labels:
          instance: "ssl-proxy-server"

  # ---- Nginx Exporter (proxy metrics) ----
  # Active connections, requests/sec, reading/writing/waiting
  - job_name: "nginx_exporter"
    static_configs:
      - targets: ["localhost:9113"]
        labels:
          instance: "ssl-proxy-server"
