# /etc/nginx/nginx.conf
#
# Nginx main configuration — optimized for SSL offloading proxy
# Tuned for high-throughput TLS termination
#

user www-data;

# Auto-detect CPU cores — use all available for SSL processing
worker_processes auto;

# Increase max open files per worker
worker_rlimit_nofile 65535;

pid /run/nginx.pid;
include /etc/nginx/modules-enabled/*.conf;

events {
    # Max simultaneous connections per worker
    worker_connections 16384;

    # Use epoll for Linux (most efficient)
    use epoll;

    # Accept as many connections as possible
    multi_accept on;
}

http {
    # --- Basic Settings ---
    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    types_hash_max_size 2048;
    server_tokens off;

    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    # --- Timeouts ---
    keepalive_timeout 65;
    keepalive_requests 1000;
    client_header_timeout 15;
    client_body_timeout 15;
    send_timeout 15;

    # --- Buffer Sizes ---
    client_body_buffer_size 16k;
    client_header_buffer_size 1k;
    large_client_header_buffers 4 16k;
    client_max_body_size 10m;

    # --- SSL Global Settings ---
    # SSL session cache: shared across all workers
    # 1MB ≈ 4000 sessions; 50MB ≈ 200,000 sessions
    ssl_session_cache shared:SSL:50m;
    ssl_session_timeout 1d;
    ssl_session_tickets off;

    # Modern TLS only
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers on;

    # OCSP Stapling (disabled for self-signed certs, enable in production)
    # ssl_stapling on;
    # ssl_stapling_verify on;

    # --- Logging ---
    # Custom log format with timing info for monitoring
    log_format monitoring '$remote_addr - $remote_user [$time_local] '
                          '"$request" $status $body_bytes_sent '
                          '"$http_referer" "$http_user_agent" '
                          'rt=$request_time uct=$upstream_connect_time '
                          'uht=$upstream_header_time urt=$upstream_response_time '
                          'ssl=$ssl_protocol/$ssl_cipher';

    access_log /var/log/nginx/access.log monitoring buffer=256k flush=5s;
    error_log /var/log/nginx/error.log warn;

    # --- Gzip ---
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 2;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml;

    # --- Upstream Backend ---
    upstream backend_servers {
        # Simple backend on localhost
        server 127.0.0.1:8080;

        # Keep connections alive to backend (reduces overhead)
        keepalive 128;
    }

    # --- Include virtual host configs ---
    include /etc/nginx/sites-enabled/*;
}
