# /etc/nginx/sites-available/ssl-proxy.conf
#
# SSL offloading virtual host — terminates TLS and proxies to backend
#

# HTTP → HTTPS redirect
server {
    listen 80 default_server;
    listen [::]:80 default_server;
    server_name _;

    return 301 https://$host$request_uri;
}

# HTTPS — SSL termination proxy
server {
    listen 443 ssl default_server;
    listen [::]:443 ssl default_server;
    server_name _;

    # --- SSL Certificate ---
    ssl_certificate     /etc/nginx/ssl/server.crt;
    ssl_certificate_key /etc/nginx/ssl/server.key;

    # --- Proxy to backend (plain HTTP after SSL termination) ---
    location / {
        proxy_pass http://backend_servers;

        # Standard proxy headers
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # SSL-specific headers (passed to backend)
        proxy_set_header X-SSL-Protocol $ssl_protocol;
        proxy_set_header X-SSL-Cipher $ssl_cipher;

        # Connection pooling to backend
        proxy_http_version 1.1;
        proxy_set_header Connection "";

        # Timeouts
        proxy_connect_timeout 5s;
        proxy_send_timeout 10s;
        proxy_read_timeout 10s;

        # Buffers
        proxy_buffer_size 4k;
        proxy_buffers 8 4k;
    }
}

# Nginx stub_status for monitoring (internal only)
server {
    listen 8081;
    server_name _;

    location /stub_status {
        stub_status;
        allow 127.0.0.1;
        deny all;
    }
}
