# /etc/sysctl.d/99-ssl-proxy-tuning.conf
#
# Kernel tuning parameters for a high-throughput SSL offloading proxy
# handling ~25,000 requests per second
#
# These settings optimize the network stack, connection handling,
# and system limits for this specific workload.
#

# ================================================================
# TCP CONNECTION TUNING
# ================================================================

# Increase the maximum listen backlog (pending connections queue)
net.core.somaxconn = 65535

# Increase the maximum backlog of packets queued at the NIC
net.core.netdev_max_backlog = 65535

# Increase the maximum SYN backlog
net.ipv4.tcp_max_syn_backlog = 65535

# Enable reuse of TIME_WAIT sockets for new connections
net.ipv4.tcp_tw_reuse = 1

# Reduce FIN timeout (faster connection teardown)
net.ipv4.tcp_fin_timeout = 15

# Widen the ephemeral port range (critical at 25k req/s)
net.ipv4.ip_local_port_range = 1024 65535

# Increase maximum orphan sockets
net.ipv4.tcp_max_orphans = 65535

# ================================================================
# TCP BUFFER TUNING
# ================================================================

# Increase max receive/send buffer sizes (16MB)
net.core.rmem_max = 16777216
net.core.wmem_max = 16777216

# TCP auto-tuning buffer sizes: min, default, max
net.ipv4.tcp_rmem = 4096 87380 16777216
net.ipv4.tcp_wmem = 4096 87380 16777216

# Increase the total TCP memory pages
net.ipv4.tcp_mem = 65536 131072 262144

# ================================================================
# TCP PERFORMANCE
# ================================================================

# Enable TCP window scaling
net.ipv4.tcp_window_scaling = 1

# Enable TCP timestamps
net.ipv4.tcp_timestamps = 1

# Enable selective acknowledgments
net.ipv4.tcp_sack = 1

# Reduce keepalive time
net.ipv4.tcp_keepalive_time = 600
net.ipv4.tcp_keepalive_intvl = 30
net.ipv4.tcp_keepalive_probes = 5

# ================================================================
# GENERAL NETWORK
# ================================================================

# Don't cache metrics from closed connections
net.ipv4.tcp_no_metrics_save = 1

# Enable SYN cookies (protection against SYN flood)
net.ipv4.tcp_syncookies = 1

# Increase max connections tracked (if conntrack is used)
# net.netfilter.nf_conntrack_max = 1048576

# ================================================================
# FILE DESCRIPTORS
# ================================================================

# Increase system-wide file descriptor limit
fs.file-max = 1000000

# ================================================================
# VIRTUAL MEMORY
# ================================================================

# Reduce swappiness (proxy should stay in RAM)
vm.swappiness = 10

# Don't let dirty pages accumulate too much (flush to disk sooner)
vm.dirty_ratio = 10
vm.dirty_background_ratio = 5
