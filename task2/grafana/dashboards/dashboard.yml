# /etc/grafana/provisioning/dashboards/dashboard.yml
#
# Auto-provision dashboards from the filesystem
#

apiVersion: 1

providers:
  - name: "SSL Proxy Monitoring"
    orgId: 1
    folder: ""
    type: file
    disableDeletion: false
    editable: true
    options:
      path: /var/lib/grafana/dashboards
      foldersFromFilesStructure: false
